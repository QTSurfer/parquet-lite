name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  codecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Checkstyle
        run: mvn -B checkstyle:check -Dcheckstyle.config.location=checkstyle.xml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Test
        run: mvn -B test
